trainer:
  epochs: 50

  batch_size: 32

  mixed_precision: true

  gradient_clip: 1.0

  early_stopping:
    patience: 10
    monitor: validation_loss

  checkpoint:
    monitor: validation_accuracy
    mode: max
    save_best_only: true

optimizer:
  name: adamw

  lr: 0.0003

  weight_decay: 0.0001

scheduler:
  name: cosine

  params:
    T_max: 50
    eta_min: 0.000001

loss:
  name: cross_entropy